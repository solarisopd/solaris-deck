<script>
(function () {
  // 1) 마우스 우클릭(컨텍스트 메뉴) 차단
  document.addEventListener('contextmenu', function (e) {
    e.preventDefault();
  }, false);

  // 2) PDF Export Mode 단축키('e') 차단 — 메뉴 항목 숨김과 함께 진입 자체를 차단
  //    capture 단계에서 가로채 reveal/menu 핸들러보다 먼저 처리
  document.addEventListener('keydown', function (e) {
    if ((e.key === 'e' || e.key === 'E') && !e.ctrlKey && !e.metaKey && !e.altKey) {
      e.stopPropagation();
      e.preventDefault();
    }
  }, true);
}());
</script>
